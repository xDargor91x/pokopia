<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pokopia">
<meta name="theme-color" content="#ffcf40">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Pokopia — House Matcher</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1923;
  --surface: #1a2635;
  --surface2: #22334a;
  --surface3: #2a3f58;
  --accent: #ffcf40;
  --accent2: #ff6b6b;
  --accent3: #6bcfff;
  --text: #f0f4f8;
  --muted: #7a93ac;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: radial-gradient(circle, rgba(255,207,64,0.07) 1px, transparent 1px), radial-gradient(circle, rgba(107,207,255,0.05) 1px, transparent 1px);
  background-size: 60px 60px, 97px 97px;
}
.app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* SIDEBAR */
.sidebar { width: 290px; min-width: 290px; background: var(--surface); border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; }
.sidebar-header { padding: 22px 18px 14px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.sidebar-header h1 { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: var(--accent); text-shadow: 0 0 20px rgba(255,207,64,0.3), 2px 2px 0 rgba(0,0,0,0.4); }
.sidebar-header p { font-size: 0.73rem; color: var(--muted); font-weight: 600; margin-top: 2px; }
.houses-list { flex: 1; overflow-y: auto; padding: 10px 10px 6px; }
.houses-list::-webkit-scrollbar { width: 3px; }
.houses-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.house-item { background: var(--surface2); border: 2px solid transparent; border-radius: 12px; padding: 11px 13px; cursor: pointer; margin-bottom: 7px; transition: all 0.18s; position: relative; }
.house-item:hover { border-color: rgba(107,207,255,0.3); }
.house-item.active { border-color: var(--accent); background: rgba(255,207,64,0.07); }
.house-item-name { font-family: 'Fredoka One', cursive; font-size: 0.98rem; color: var(--text); }
.house-item-meta { font-size: 0.7rem; color: var(--muted); margin-top: 3px; font-weight: 600; }
.house-item-chips { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
.mini-chip { font-size: 0.62rem; font-weight: 700; background: rgba(107,207,255,0.1); color: var(--accent3); border-radius: 4px; padding: 1px 5px; }
.house-del { position: absolute; top: 7px; right: 7px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.78rem; padding: 2px 4px; border-radius: 4px; opacity: 0; transition: all 0.15s; }
.house-item:hover .house-del { opacity: 1; }
.house-del:hover { color: var(--accent2); background: rgba(255,107,107,0.1); }
.add-house-btn { margin: 0 10px 10px; background: rgba(255,207,64,0.07); border: 2px dashed rgba(255,207,64,0.28); border-radius: 12px; padding: 11px; color: var(--accent); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.83rem; cursor: pointer; width: calc(100% - 20px); transition: all 0.2s; text-align: center; }
.add-house-btn:hover { background: rgba(255,207,64,0.14); border-color: var(--accent); }

/* MAIN */
.main { flex: 1; padding: 26px 26px 60px; overflow-y: auto; min-width: 0; }
.card { background: var(--surface); border-radius: var(--radius); padding: 22px 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.07); animation: fadeUp 0.35s ease both; }
.card-title { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--accent3); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }

/* HOUSE EDITOR */
.house-editor-top { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
.house-name-input { background: transparent; border: none; border-bottom: 2px solid rgba(255,255,255,0.1); color: var(--text); font-family: 'Fredoka One', cursive; font-size: 1.4rem; padding: 3px 2px; min-width: 160px; max-width: 260px; transition: border-color 0.2s; }
.house-name-input:focus { outline: none; border-color: var(--accent); }
.house-name-input::placeholder { color: rgba(255,255,255,0.18); }
.size-selector { display: flex; gap: 7px; }
.size-btn { background: var(--surface2); border: 2px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 6px 13px; color: var(--muted); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.78rem; cursor: pointer; transition: all 0.18s; }
.size-btn:hover { border-color: var(--accent3); color: var(--text); }
.size-btn.active { border-color: var(--accent); background: rgba(255,207,64,0.1); color: var(--accent); }
.info-label { font-size: 0.7rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 9px; }

/* SLOTS */
.slots-row { display: flex; gap: 9px; flex-wrap: wrap; }
.house-slot { background: var(--surface2); border: 2px dashed rgba(255,255,255,0.11); border-radius: 11px; width: 102px; height: 84px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 0.73rem; color: var(--muted); font-weight: 700; transition: all 0.18s; position: relative; }
.house-slot.filled { border-style: solid; border-color: var(--accent3); background: rgba(107,207,255,0.07); color: var(--text); }
.slot-remove { position: absolute; top: 3px; right: 4px; background: none; border: none; color: var(--accent2); cursor: pointer; font-size: 0.82rem; padding: 0; opacity: 0.55; }
.slot-remove:hover { opacity: 1; }

/* GRID */
.grid-search { margin-bottom: 11px; }
.grid-search input { background: var(--surface2); border: 1.5px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 8px 13px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.86rem; width: 100%; transition: border-color 0.2s; }
.grid-search input:focus { outline: none; border-color: var(--accent); }
.grid-search input::placeholder { color: var(--muted); }
.pokemon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 7px; max-height: 400px; overflow-y: auto; padding-right: 3px; }
.pokemon-grid::-webkit-scrollbar { width: 3px; }
.pokemon-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.poke-btn { background: var(--surface2); border: 2px solid transparent; border-radius: 10px; padding: 9px 5px; cursor: pointer; text-align: center; transition: all 0.16s; color: var(--text); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.76rem; position: relative; }
.poke-btn:hover:not(.incompatible):not(.assigned-other):not(.no-data) { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 5px 14px rgba(255,207,64,0.12); }
.poke-btn.selected { border-color: var(--accent); background: rgba(255,207,64,0.1); }
.poke-btn.incompatible { opacity: 0.3; cursor: not-allowed; filter: grayscale(0.5); }
.poke-btn.no-data { opacity: 0.38; cursor: not-allowed; }
.poke-btn.assigned-other { cursor: default; }
.assigned-overlay { position: absolute; inset: 0; border-radius: 8px; background: rgba(10,18,28,0.84); display: flex; align-items: center; justify-content: center; padding: 4px; text-align: center; }
.assigned-overlay span { font-size: 0.58rem; font-weight: 800; color: var(--muted); line-height: 1.35; }
.poke-name { margin-top: 2px; font-size: 0.72rem; line-height: 1.2; }
.poke-types { display: flex; gap: 2px; justify-content: center; flex-wrap: wrap; margin-top: 3px; }
.type-badge { font-size: 0.56rem; font-weight: 800; padding: 1px 4px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.3px; }
.habitat-label { font-size: 0.58rem; color: var(--muted); margin-top: 2px; }
.t-grass{background:rgba(93,187,99,0.2);color:#5dbb63} .t-fire{background:rgba(255,112,67,0.2);color:#ff7043} .t-water{background:rgba(66,165,245,0.2);color:#42a5f5} .t-poison{background:rgba(171,71,188,0.2);color:#ab47bc} .t-flying{background:rgba(128,222,234,0.2);color:#80deea} .t-bug{background:rgba(174,213,129,0.2);color:#aed581} .t-normal{background:rgba(189,189,189,0.15);color:#bdbdbd} .t-electric{background:rgba(255,235,59,0.2);color:#ffee58} .t-psychic{background:rgba(236,64,122,0.2);color:#f06292} .t-rock{background:rgba(161,136,127,0.2);color:#a1887f} .t-ground{background:rgba(255,183,77,0.2);color:#ffb74d} .t-steel{background:rgba(144,164,174,0.2);color:#90a4ae} .t-ice{background:rgba(129,212,250,0.2);color:#81d4fa} .t-dragon{background:rgba(103,58,183,0.2);color:#9575cd} .t-dark{background:rgba(78,52,46,0.3);color:#a1887f} .t-ghost{background:rgba(126,87,194,0.2);color:#9575cd} .t-fighting{background:rgba(239,83,80,0.2);color:#ef5350} .t-fairy{background:rgba(240,98,146,0.2);color:#f48fb1}

/* SUGGESTIONS */
.sug-list { display: flex; flex-direction: column; gap: 9px; }
.sug-card { background: var(--surface2); border-radius: 11px; padding: 12px 14px; border-left: 4px solid var(--accent3); display: flex; align-items: center; gap: 12px; transition: all 0.18s; cursor: pointer; position: relative; overflow: hidden; }
.sug-card::after { content: '＋ Add to house'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 0.67rem; color: var(--muted); font-weight: 800; opacity: 0; transition: opacity 0.18s; }
.sug-card:hover { transform: translateX(3px); background: var(--surface3); border-left-color: var(--accent); }
.sug-card:hover::after { opacity: 1; }
.sug-card.top { border-left-color: var(--accent); }
.sug-rank { font-family: 'Fredoka One', cursive; font-size: 1.35rem; min-width: 26px; line-height: 1; }
.sug-rank.gold { color: var(--accent); } .sug-rank.silver { color: #b0bec5; } .sug-rank.bronze { color: #ff8a65; }
.sug-info { flex: 1; min-width: 0; padding-right: 50px; }
.sug-name { font-family: 'Fredoka One', cursive; font-size: 0.97rem; }
.score-row { display: flex; align-items: center; gap: 7px; margin: 4px 0 4px; }
.score-bg { flex: 1; height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent3), var(--accent)); transition: width 0.5s ease; }
.score-val { font-size: 0.68rem; font-weight: 800; color: var(--accent); min-width: 28px; text-align: right; }
.sug-tags { display: flex; flex-wrap: wrap; gap: 3px; }
.tag { display: inline-block; border-radius: 5px; padding: 1px 6px; font-size: 0.66rem; font-weight: 700; }
.tag-fav { background: rgba(107,207,255,0.1); color: var(--accent3); }
.tag-habitat { background: rgba(93,187,99,0.12); color: #5dbb63; }
.tag-food { background: rgba(255,207,64,0.1); color: var(--accent); }
.compat-pct { display: inline-flex; align-items: center; gap: 3px; background: rgba(255,207,64,0.08); border: 1px solid rgba(255,207,64,0.18); border-radius: 20px; padding: 1px 8px; font-size: 0.7rem; font-weight: 800; color: var(--accent); }
.house-profile { background: var(--surface2); border-radius: 10px; padding: 11px 14px; margin-bottom: 13px; font-size: 0.78rem; }
.house-profile strong { color: var(--accent3); }
.profile-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.empty-state { text-align: center; color: var(--muted); padding: 26px 0; }
.empty-state .big { font-size: 2rem; display: block; margin-bottom: 7px; }
.no-house-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 65vh; text-align: center; }
.no-house-screen .big { font-size: 3rem; display: block; margin-bottom: 12px; }
.no-house-screen p { color: var(--muted); margin-bottom: 18px; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeIn 0.15s ease; }
.modal { background: var(--surface); border-radius: var(--radius); padding: 26px; width: 350px; max-width: 92vw; border: 1px solid rgba(255,255,255,0.1); animation: fadeUp 0.2s ease; }
.modal h2 { font-family: 'Fredoka One', cursive; font-size: 1.25rem; color: var(--accent); margin-bottom: 16px; }
.modal input { background: var(--surface2); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 9px; padding: 9px 13px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.93rem; width: 100%; margin-bottom: 14px; }
.modal input:focus { outline: none; border-color: var(--accent); }
.modal-sizes { display: flex; gap: 7px; margin-bottom: 18px; }
.modal-size-btn { flex: 1; background: var(--surface2); border: 2px solid rgba(255,255,255,0.07); border-radius: 9px; padding: 11px 6px; cursor: pointer; text-align: center; color: var(--muted); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.8rem; transition: all 0.18s; }
.modal-size-btn:hover { border-color: var(--accent3); color: var(--text); }
.modal-size-btn.active { border-color: var(--accent); background: rgba(255,207,64,0.1); color: var(--accent); }
.modal-size-btn .ico { font-size: 1.3rem; display: block; margin-bottom: 3px; }
.modal-btns { display: flex; gap: 9px; justify-content: flex-end; }
.btn { background: var(--accent); color: #1a1a1a; border: none; border-radius: 9px; padding: 9px 20px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.86rem; cursor: pointer; transition: all 0.18s; }
.btn:hover { background: #ffd966; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,207,64,0.25); }
.btn-ghost { background: transparent; border: 2px solid rgba(255,255,255,0.11); color: var(--muted); border-radius: 9px; padding: 8px 16px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.83rem; cursor: pointer; transition: all 0.18s; }
.btn-ghost:hover { border-color: var(--accent2); color: var(--accent2); }

/* CONFIRM BAR */
.confirm-bar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.07); }
.confirm-bar p { font-size:0.78rem; color:var(--muted); font-weight:600; }
.btn-confirm { background:linear-gradient(135deg,#5dbb63,#42a5f5); color:#fff; border:none; border-radius:9px; padding:10px 22px; font-family:'Nunito',sans-serif; font-weight:800; font-size:0.88rem; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:7px; }
.btn-confirm:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 4px 14px rgba(93,187,99,0.3); }
.btn-unconfirm { background:transparent; border:2px solid rgba(255,107,107,0.3); color:var(--accent2); border-radius:9px; padding:8px 16px; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.8rem; cursor:pointer; transition:all 0.18s; }
.btn-unconfirm:hover { border-color:var(--accent2); background:rgba(255,107,107,0.08); }

/* COMFORT SECTION */
.comfort-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:18px; }
.min-req-checks { display:flex; gap:10px; flex-wrap:wrap; }
.req-check { display:flex; align-items:center; gap:5px; font-size:0.75rem; font-weight:800; padding:5px 11px; border-radius:20px; }
.req-check.ok { background:rgba(93,187,99,0.13); color:#5dbb63; border:1px solid rgba(93,187,99,0.25); }
.req-check.fail { background:rgba(255,107,107,0.1); color:var(--accent2); border:1px solid rgba(255,107,107,0.2); }

/* FAVORITES ACCORDION */
.fav-list { display:flex; flex-direction:column; gap:8px; }
.fav-row { background:var(--surface2); border-radius:11px; overflow:hidden; border:1px solid rgba(255,255,255,0.06); }
.fav-row.satisfied { border-color:rgba(93,187,99,0.3); }
.fav-header { display:flex; align-items:center; gap:10px; padding:11px 14px; cursor:pointer; user-select:none; transition:background 0.15s; }
.fav-header:hover { background:rgba(255,255,255,0.03); }
.fav-check { width:20px; height:20px; border-radius:50%; border:2px solid rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:0.7rem; flex-shrink:0; transition:all 0.2s; }
.fav-check.done { background:#5dbb63; border-color:#5dbb63; color:#fff; }
.fav-label { flex:1; font-weight:700; font-size:0.85rem; }
.fav-label .who { font-size:0.65rem; color:var(--muted); font-weight:600; margin-left:6px; }
.fav-count { font-size:0.7rem; color:var(--muted); font-weight:700; }
.fav-arrow { font-size:0.7rem; color:var(--muted); transition:transform 0.2s; margin-left:4px; }
.fav-row.open .fav-arrow { transform:rotate(180deg); }
.fav-dropdown { display:none; border-top:1px solid rgba(255,255,255,0.05); }
.fav-row.open .fav-dropdown { display:block; }
.fav-dropdown-inner { padding:10px 12px; max-height:260px; overflow-y:auto; }
.fav-dropdown-inner::-webkit-scrollbar { width:3px; }
.fav-dropdown-inner::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
.items-by-type { margin-bottom:10px; }
.items-type-label { font-size:0.65rem; font-weight:800; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); margin-bottom:5px; display:flex; align-items:center; gap:5px; }
.items-grid { display:flex; flex-wrap:wrap; gap:5px; }
.item-chip { font-size:0.72rem; font-weight:700; padding:4px 10px; border-radius:7px; cursor:pointer; border:1.5px solid transparent; transition:all 0.16s; background:none; font-family:'Nunito',sans-serif; text-align:left; line-height:1.4; }
.item-chip.type-Furniture { background:rgba(161,136,127,0.13); color:#a1887f; border-color:rgba(161,136,127,0.2); }
.item-chip.type-Decoration { background:rgba(107,207,255,0.1); color:var(--accent3); border-color:rgba(107,207,255,0.18); }
.item-chip.type-Relaxation { background:rgba(93,187,99,0.12); color:#5dbb63; border-color:rgba(93,187,99,0.22); }
.item-chip.type-Toy { background:rgba(255,183,77,0.12); color:#ffb74d; border-color:rgba(255,183,77,0.22); }
.item-chip:hover { filter:brightness(1.15); transform:translateY(-1px); }
.item-chip.placed { opacity:0.45; cursor:default; transform:none; filter:none; }

/* FURNISHINGS LIST */
.furnishings-section { margin-top:18px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.07); }
.furnishings-title { font-size:0.72rem; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
.furnishing-items { display:flex; flex-wrap:wrap; gap:7px; }
.furnishing-placed { display:flex; align-items:center; gap:5px; padding:5px 10px; border-radius:8px; font-size:0.76rem; font-weight:700; }
.furnishing-placed.type-Furniture { background:rgba(161,136,127,0.15); color:#a1887f; }
.furnishing-placed.type-Decoration { background:rgba(107,207,255,0.12); color:var(--accent3); }
.furnishing-placed.type-Relaxation { background:rgba(93,187,99,0.14); color:#5dbb63; }
.furnishing-placed.type-Toy { background:rgba(255,183,77,0.14); color:#ffb74d; }
.furnishing-remove { background:none; border:none; cursor:pointer; color:inherit; opacity:0.6; font-size:0.8rem; padding:0 0 0 2px; line-height:1; }
.furnishing-remove:hover { opacity:1; }

/* TYPE ICONS */
.type-icon-Furniture { content:'🪑'; }

@keyframes fadeUp { from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0}to{opacity:1} }

/* OTHER ITEMS SECTION */
.other-items-section { margin-top:20px; }
.other-items-header { background:var(--surface2); border-radius:11px; overflow:hidden; border:1px solid rgba(255,255,255,0.06); }
.other-items-toggle { display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer; user-select:none; }
.other-items-toggle:hover { background:rgba(255,255,255,0.03); }
.other-items-body { display:none; border-top:1px solid rgba(255,255,255,0.05); }
.other-items-body.open { display:block; }
.other-items-search { padding:10px 12px 6px; }
.other-items-search input { background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.08); border-radius:8px; padding:7px 12px; color:var(--text); font-family:'Nunito',sans-serif; font-size:0.83rem; width:100%; }
.other-items-search input:focus { outline:none; border-color:var(--accent); }
.other-items-search input::placeholder { color:var(--muted); }
.other-items-inner { padding:4px 12px 12px; max-height:300px; overflow-y:auto; }
.other-items-inner::-webkit-scrollbar { width:3px; }
.other-items-inner::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }

/* MOBILE */
@media(max-width:680px){
  .app{flex-direction:column}
  .sidebar{width:100%;min-width:unset;height:auto;position:static}
  .houses-list{max-height:160px}
  .main{padding:14px 14px 80px}
  .card{padding:16px 16px}
  .pokemon-grid{grid-template-columns:repeat(auto-fill,minmax(88px,1fr));max-height:320px}
  .slots-row{gap:7px}
  .house-slot{width:88px;height:76px;font-size:0.68rem}
  .sug-info{padding-right:30px}
  .sug-card::after{display:none}
  .house-editor-top{gap:8px}
  .size-selector{flex-wrap:wrap;gap:5px}
  .size-btn{padding:5px 10px;font-size:0.72rem}
  .min-req-checks{gap:6px}
  .req-check{font-size:0.7rem;padding:4px 8px}
  .modal{padding:20px;width:95vw}
  .comfort-header{flex-direction:column;align-items:flex-start}
  .fav-label{font-size:0.8rem}
  .item-chip{font-size:0.68rem;padding:3px 8px}
  /* Safe area for notch/home bar */
  .main{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
  .sidebar{padding-bottom:env(safe-area-inset-bottom)}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>🏠 Pokopia</h1>
      <p>House Matcher</p>
    </div>
    <div class="houses-list" id="housesList"></div>
    <button class="add-house-btn" onclick="openModal()">＋ New House</button>
  </aside>
  <main class="main" id="mainContent"></main>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="bgClose(event)">
  <div class="modal">
    <h2>🏡 New House</h2>
    <input id="modalName" placeholder="House name..." maxlength="30">
    <div class="info-label">Size</div>
    <div class="modal-sizes">
      <button class="modal-size-btn" onclick="setModalSize(1)" id="ms1"><span class="ico">🏠</span>Solo<br><span style="font-size:0.66rem;opacity:0.55">(1 spot)</span></button>
      <button class="modal-size-btn" onclick="setModalSize(2)" id="ms2"><span class="ico">🏠</span>Duo<br><span style="font-size:0.66rem;opacity:0.55">(2 spots)</span></button>
      <button class="modal-size-btn active" onclick="setModalSize(4)" id="ms4"><span class="ico">🏠</span>Family<br><span style="font-size:0.66rem;opacity:0.55">(4 spots)</span></button>
    </div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="createHouse()">Create</button>
    </div>
  </div>
</div>

const CONFLICTS={Bright:'Dark',Dark:'Bright',Cool:'Warm',Warm:'Cool',Dry:'Humid',Humid:'Dry'};
const HABI_E={Bright:'☀️',Dark:'🌑',Cool:'❄️',Warm:'🔥',Dry:'🏜️',Humid:'🌿'};

let houses=[], activeId=null, modalSize=4;

function uid(){ return Date.now()+Math.random(); }
function hasData(p){ return p.habitat!==''&&p.favorites.length>0; }
function allAssigned(){ const a={}; houses.forEach(h=>h.residents.forEach(n=>a[n]=h.id)); return a; }

// Items lookup: for a given tag, return all items that have that tag (with any tag count > 0)
function itemsForTag(tag){ return ITEMS.filter(it=>it.tags.includes(tag)); }

function typeClass(t){ return 't-'+t.toLowerCase().replace(/\s/g,''); }
function typeEmoji(t){
  const m={Grass:'🌿',Fire:'🔥',Water:'💧',Poison:'☠️',Flying:'🌬️',Bug:'🐛',Normal:'⭐',Electric:'⚡',Psychic:'🔮',Rock:'🪨',Ground:'🟤',Steel:'⚙️',Ice:'❄️',Dragon:'🐉',Dark:'🌑',Ghost:'👻',Fighting:'🥊',Fairy:'🌸'};
  return m[t]||'❓';
}
function compatible(p,residents){
  const habs=residents.map(n=>POKEMON.find(x=>x.name===n)?.habitat).filter(Boolean);
  return !habs.some(h=>CONFLICTS[h]===p.habitat);
}

// MODAL
function openModal(){
  document.getElementById('modalName').value='';
  setModalSize(4);
  document.getElementById('modalOverlay').style.display='flex';
  setTimeout(()=>document.getElementById('modalName').focus(),50);
}
function closeModal(){ document.getElementById('modalOverlay').style.display='none'; }
function bgClose(e){ if(e.target===document.getElementById('modalOverlay'))closeModal(); }
function setModalSize(n){
  modalSize=n;
  [1,2,4].forEach(s=>document.getElementById('ms'+s).classList.toggle('active',s===n));
}
function createHouse(){
  const name=document.getElementById('modalName').value.trim()||`House ${houses.length+1}`;
  const h={id:uid(),name,size:modalSize,residents:[],confirmed:false,furnishings:[]};
  houses.push(h);
  closeModal();
  selectHouse(h.id);
}
document.getElementById('modalName').addEventListener('keydown',e=>{if(e.key==='Enter')createHouse();});

// SIDEBAR
function renderSidebar(){
  const el=document.getElementById('housesList');
  if(!houses.length){el.innerHTML='<div style="padding:14px;color:var(--muted);font-size:0.76rem;text-align:center">No houses yet</div>';return;}
  el.innerHTML=houses.map(h=>{
    const act=h.id===activeId;
    const chips=h.residents.slice(0,4).map(n=>`<span class="mini-chip">${n}</span>`).join('')+(h.residents.length>4?`<span class="mini-chip">+${h.residents.length-4}</span>`:'');
    const confirmedBadge=h.confirmed?` <span style="font-size:0.6rem;background:rgba(93,187,99,0.2);color:#5dbb63;border-radius:4px;padding:1px 5px;font-weight:800">✓ Confirmed</span>`:'';
    const furnCount=h.furnishings?.length||0;
    return `<div class="house-item${act?' active':''}" onclick="selectHouse(${h.id})">
      <button class="house-del" onclick="delHouse(event,${h.id})">🗑</button>
      <div class="house-item-name">🏠 ${h.name}${confirmedBadge}</div>
      <div class="house-item-meta">${h.residents.length}/${h.size} residents · ${h.size===1?'Solo':h.size===2?'Duo':'Family'}${furnCount?` · ${furnCount} items`:''}</div>
      ${h.residents.length?`<div class="house-item-chips">${chips}</div>`:''}
    </div>`;
  }).join('');
}
function delHouse(e,id){
  e.stopPropagation();
  if(!confirm('Delete this house?'))return;
  houses=houses.filter(h=>h.id!==id);
  if(activeId===id)activeId=houses.length?houses[0].id:null;
  renderSidebar(); renderMain();
}
function selectHouse(id){ activeId=id; renderSidebar(); renderMain(); }

// MAIN
function renderMain(){
  const main=document.getElementById('mainContent');
  if(!activeId){
    main.innerHTML=`<div class="no-house-screen"><span class="big">🏡</span><p>Select or create a house!</p><button class="btn" onclick="openModal()">＋ Create a House</button></div>`;
    return;
  }
  const h=houses.find(x=>x.id===activeId);
  if(!h)return;

  const isEmpty = h.residents.length === 0;
  const confirmBar = h.confirmed
    ? `<div class="confirm-bar">
        <p>✅ Residents confirmed — see the Comfort section below</p>
        <button class="btn-unconfirm" onclick="unconfirmHouse()">✏️ Edit residents</button>
       </div>`
    : `<div class="confirm-bar">
        <p>${isEmpty ? 'Add at least one Pokémon, then confirm' : 'Happy with these residents?'}</p>
        <button class="btn-confirm" onclick="confirmHouse()" ${isEmpty ? 'disabled' : ''} style="${isEmpty ? 'opacity:0.4;cursor:not-allowed' : ''}">✔ Confirm Residents</button>
       </div>`;

  main.innerHTML=`
    <div class="card">
      <div class="house-editor-top">
        <input class="house-name-input" value="${h.name}" onchange="renameHouse(this.value)" placeholder="House name..." ${h.confirmed?'readonly style="opacity:0.6;cursor:default"':''}>
        ${!h.confirmed?`<div class="size-selector">
          ${[1,2,4].map(s=>`<button class="size-btn${h.size===s?' active':''}" onclick="resizeHouse(${s})">${s===1?'Solo':s===2?'Duo':'Family'} (${s})</button>`).join('')}
        </div>`:`<span style="font-size:0.75rem;color:var(--muted);font-weight:700">${h.size===1?'Solo':h.size===2?'Duo':'Family'} house</span>`}
      </div>
      <div class="info-label">Residents (${h.residents.length}/${h.size})</div>
      <div class="slots-row" id="slotsRow"></div>
      ${confirmBar}
    </div>
    ${!h.confirmed?`
    <div class="card">
      <div class="card-title"><span>⚡</span> Add Pokémon</div>
      <div class="grid-search"><input id="gridSearch" placeholder="🔍 Search..." oninput="renderGrid()"></div>
      <div class="pokemon-grid" id="pokemonGrid"></div>
    </div>
    <div class="card">
      <div class="card-title"><span>✨</span> Suggested Roommates</div>
      <div id="sugArea"></div>
    </div>`:`<div class="card" id="comfortCard"><div id="comfortArea"></div></div>`}`;

  renderSlots();
  if(!h.confirmed){ renderGrid(); renderSuggestions(); }
  else renderComfort();
}

function renameHouse(v){
  const h=houses.find(x=>x.id===activeId);
  if(h){h.name=v.trim()||h.name;renderSidebar();}
}
function resizeHouse(n){
  const h=houses.find(x=>x.id===activeId);if(!h)return;
  if(h.residents.length>n&&!confirm(`Shrinking to ${n} will remove ${h.residents.length-n} resident(s). Continue?`))return;
  h.residents=h.residents.slice(0,n);h.size=n;
  renderSidebar();renderMain();
}

// SLOTS
function renderSlots(){
  const h=houses.find(x=>x.id===activeId);
  const el=document.getElementById('slotsRow');
  if(!el||!h)return;
  el.innerHTML=Array.from({length:h.size},(_,i)=>{
    const n=h.residents[i];
    if(n){
      const p=POKEMON.find(x=>x.name===n);
      const esc=n.replace(/'/g,"\\'");
      return `<div class="house-slot filled">
        <button class="slot-remove" onclick="removePokemon('${esc}')">✕</button>
        <div style="font-size:1.2rem">${p.types[0]?typeEmoji(p.types[0]):'❓'}</div>
        <div style="font-size:0.7rem;font-weight:700;max-width:94px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center">${n}</div>
        <div style="font-size:0.58rem;color:var(--muted)">${HABI_E[p.habitat]||''} ${p.habitat}</div>
      </div>`;
    }
    return `<div class="house-slot"><div style="font-size:1.1rem">＋</div><div>Empty</div></div>`;
  }).join('');
}

// GRID
function renderGrid(){
  const h=houses.find(x=>x.id===activeId);
  const el=document.getElementById('pokemonGrid');
  const si=document.getElementById('gridSearch');
  if(!el||!h)return;
  const q=si?si.value.toLowerCase():'';
  const asgn=allAssigned();
  const inHouseSet=new Set(h.residents);
  const incompatHabs=new Set(h.residents.map(n=>POKEMON.find(p=>p.name===n)?.habitat).filter(Boolean).map(hb=>CONFLICTS[hb]).filter(Boolean));

  const filtered=POKEMON.filter(p=>p.name.toLowerCase().includes(q));
  // sort: residents first (selected), then normal, then assigned-other at bottom
  const sorted=[
    ...filtered.filter(p=>inHouseSet.has(p.name)),
    ...filtered.filter(p=>!inHouseSet.has(p.name)&&(!asgn[p.name]||asgn[p.name]===activeId)),
    ...filtered.filter(p=>!inHouseSet.has(p.name)&&asgn[p.name]&&asgn[p.name]!==activeId)
  ];

  el.innerHTML=sorted.map(p=>{
    const inHouse=inHouseSet.has(p.name);
    const asnOther=asgn[p.name]&&asgn[p.name]!==activeId;
    const noData=!hasData(p);
    const incompat=!inHouse&&!noData&&incompatHabs.has(p.habitat);
    let cls='poke-btn';
    if(inHouse)cls+=' selected';
    else if(asnOther)cls+=' assigned-other';
    else if(incompat)cls+=' incompatible';
    else if(noData)cls+=' no-data';
    const asnName=asnOther?houses.find(x=>x.id===asgn[p.name])?.name||'?':'';
    const esc=p.name.replace(/'/g,"\\'");
    return `<div class="${cls}" onclick="clickPoke('${esc}',${asnOther},${incompat},${noData})" title="${incompat?'Incompatible habitat':''}${noData?'Data coming soon':''}">
      <div style="font-size:1.2rem">${p.types[0]?typeEmoji(p.types[0]):'❓'}</div>
      <div class="poke-name">${p.name}</div>
      <div class="poke-types">${p.types.map(t=>`<span class="type-badge ${typeClass(t)}">${t}</span>`).join('')}</div>
      ${p.habitat?`<div class="habitat-label">${HABI_E[p.habitat]||''} ${p.habitat}</div>`:''}
      ${asnOther?`<div class="assigned-overlay"><span>Assigned to<br><strong style="color:var(--accent3)">${asnName}</strong></span></div>`:''}
    </div>`;
  }).join('');
}

function clickPoke(name,asnOther,incompat,noData){
  if(asnOther||noData)return;
  const h=houses.find(x=>x.id===activeId);if(!h)return;
  const p=POKEMON.find(x=>x.name===name);
  if(h.residents.includes(name)){removePokemon(name);return;}
  if(incompat){
    const c=h.residents.map(n=>POKEMON.find(x=>x.name===n)?.habitat).filter(Boolean).find(hb=>CONFLICTS[hb]===p.habitat);
    alert(`${name} (${p.habitat}) conflicts with ${c} habitat in this house!`);return;
  }
  if(h.residents.length>=h.size){alert(`House is full! (${h.size} spots)`);return;}
  h.residents.push(name);
  renderSidebar();renderSlots();renderGrid();renderSuggestions();
}
function removePokemon(name){
  const h=houses.find(x=>x.id===activeId);if(!h)return;
  if(h.confirmed)return; // locked when confirmed
  h.residents=h.residents.filter(n=>n!==name);
  renderSidebar();renderSlots();renderGrid();renderSuggestions();
}

// SCORE
function score(p,residents){
  if(!residents.length||!hasData(p))return{score:0,matches:[]};
  const rd=residents.map(n=>POKEMON.find(x=>x.name===n)).filter(Boolean);
  const matches=[];let s=0;
  const allFavs=[...new Set(rd.flatMap(r=>r.favorites))];
  p.favorites.filter(f=>allFavs.includes(f)).forEach(f=>{s+=4;matches.push({label:f,type:'fav'});});
  const hm=rd.filter(r=>r.habitat===p.habitat).length;
  if(hm>0){s+=hm*2;matches.push({label:`${HABI_E[p.habitat]||''} ${p.habitat}`,type:'habitat'});}
  const fm=rd.filter(r=>r.food===p.food).length;
  if(fm>0){s+=fm*1;matches.push({label:`🍽 ${p.food}`,type:'food'});}
  return{score:s,matches};
}

// SUGGESTIONS
function renderSuggestions(){
  const el=document.getElementById('sugArea');if(!el)return;
  const h=houses.find(x=>x.id===activeId);if(!h)return;
  if(!h.residents.length){el.innerHTML=`<div class="empty-state"><span class="big">🏠</span>Add a Pokémon to see suggestions!</div>`;return;}
  if(h.residents.length>=h.size){el.innerHTML=`<div class="empty-state"><span class="big">🎉</span>House is full! All ${h.size} spots taken.</div>`;return;}
  const asgn=allAssigned();
  const incompatHabs=new Set(h.residents.map(n=>POKEMON.find(p=>p.name===n)?.habitat).filter(Boolean).map(hb=>CONFLICTS[hb]).filter(Boolean));
  const cands=POKEMON.filter(p=>!h.residents.includes(p.name)&&!asgn[p.name]&&hasData(p)&&!incompatHabs.has(p.habitat));
  if(!cands.length){el.innerHTML=`<div class="empty-state"><span class="big">😬</span>No compatible unassigned Pokémon available!</div>`;return;}
  const scored=cands.map(p=>({...p,...score(p,h.residents)})).sort((a,b)=>b.score-a.score).slice(0,10);
  const maxS=scored[0]?.score||1;
  const rd=h.residents.map(n=>POKEMON.find(p=>p.name===n));
  const allF=rd.flatMap(r=>r.favorites);
  const fc={};allF.forEach(f=>{fc[f]=(fc[f]||0)+1;});
  const sharedF=Object.entries(fc).filter(([,c])=>c>1).sort((a,b)=>b[1]-a[1]).map(([f])=>f);
  const habs=[...new Set(rd.map(r=>r.habitat))];
  const foods=[...new Set(rd.map(r=>r.food))];
  let html='';
  if(h.residents.length>1||sharedF.length){
    html+=`<div class="house-profile"><strong>🏡 House profile</strong><div class="profile-tags">
      ${habs.map(h=>`<span class="tag tag-habitat">${HABI_E[h]||''} ${h}</span>`).join('')}
      ${foods.map(f=>`<span class="tag tag-food">🍽 ${f}</span>`).join('')}
      ${sharedF.slice(0,6).map(f=>`<span class="tag tag-fav">⭐ ${f}</span>`).join('')}
    </div></div>`;
  }
  const medals=['🥇','🥈','🥉'];
  html+=`<div class="sug-list">${scored.map((p,i)=>{
    const pct=maxS>0?Math.round(p.score/maxS*100):0;
    const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const esc=p.name.replace(/'/g,"\\'");
    const tags=p.matches.map(m=>`<span class="tag tag-${m.type}">${m.label}</span>`).join('');
    return `<div class="sug-card${i===0?' top':''}" onclick="addFromSug('${esc}')">
      <div class="sug-rank ${rc}">${medals[i]||'#'+(i+1)}</div>
      <div class="sug-info">
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
          <span class="sug-name">${p.types[0]?typeEmoji(p.types[0]):'❓'} ${p.name}</span>
          <div>${p.types.map(t=>`<span class="type-badge ${typeClass(t)}">${t}</span>`).join(' ')}</div>
          <span class="compat-pct">⚡ ${pct}%</span>
        </div>
        <div class="score-row"><div class="score-bg"><div class="score-fill" style="width:${pct}%"></div></div><span class="score-val">${p.score}pt</span></div>
        <div class="sug-tags">${tags||'<span style="color:var(--muted);font-size:0.68rem">No strong shared preferences</span>'}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
  el.innerHTML=html;
}

function addFromSug(name){
  const h=houses.find(x=>x.id===activeId);
  if(!h||h.residents.length>=h.size||h.residents.includes(name))return;
  h.residents.push(name);
  renderSidebar();renderSlots();renderGrid();renderSuggestions();
}

function confirmHouse(){
  const h=houses.find(x=>x.id===activeId);
  if(!h||h.residents.length===0)return;
  h.confirmed=true;
  h.furnishings=h.furnishings||[];
  renderSidebar();renderMain();
}
function unconfirmHouse(){
  const h=houses.find(x=>x.id===activeId);
  if(!h)return;
  if(h.furnishings&&h.furnishings.length>0){
    if(!confirm('Editing residents will clear all furnishings. Continue?'))return;
    h.furnishings=[];
  }
  h.confirmed=false;
  renderSidebar();renderMain();
}

// ─────────────────────────────────────────────
// COMFORT
// ─────────────────────────────────────────────
const TYPE_ICON={Furniture:'🪑',Decoration:'🎨',Relaxation:'🛋️',Toy:'🧸'};
const REQUIRED_TYPES=['Decoration','Relaxation','Toy'];
const MAX_PTS=4;

function getFavRequirements(h){
  const favMap={};
  h.residents.forEach(name=>{
    const p=POKEMON.find(x=>x.name===name);
    if(!p)return;
    p.favorites.forEach(f=>{
      if(!favMap[f])favMap[f]=[];
      if(!favMap[f].includes(name))favMap[f].push(name);
    });
  });
  return favMap;
}

// Points a single pokemon earns from current furnishings
// Each item in furnishings whose tags include a favorite of this pokemon = 1 point (duplicates allowed)
function pokemonPoints(pokeName, furnishings){
  const p=POKEMON.find(x=>x.name===pokeName);
  if(!p||!p.favorites.length)return 0;
  let pts=0;
  furnishings.forEach(itemName=>{
    const it=ITEMS.find(x=>x.name===itemName);
    if(!it)return;
    // count how many of this pokemon's favorites this item satisfies (each = 1 pt)
    pts+=it.tags.filter(tag=>p.favorites.includes(tag)).length;
  });
  return pts;
}

// How many points does adding this item give to a specific pokemon?
function itemPtsForPokemon(itemName, pokeName){
  const it=ITEMS.find(x=>x.name===itemName);
  const p=POKEMON.find(x=>x.name===pokeName);
  if(!it||!p)return 0;
  return it.tags.filter(tag=>p.favorites.includes(tag)).length;
}

function addFurnishing(itemName){
  const h=houses.find(x=>x.id===activeId);if(!h)return;
  h.furnishings.push(itemName); // allow duplicates
  renderComfort();
}
function removeFurnishing(idx){
  const h=houses.find(x=>x.id===activeId);if(!h)return;
  h.furnishings.splice(idx,1);
  renderComfort();
}

function renderComfort(){
  const el=document.getElementById('comfortArea');if(!el)return;
  const h=houses.find(x=>x.id===activeId);if(!h)return;
  const favMap=getFavRequirements(h);
  const favKeys=Object.keys(favMap).sort();
  const furnishings=h.furnishings||[];

  // ── Min type requirements ──
  const typesMet={};
  REQUIRED_TYPES.forEach(t=>{
    typesMet[t]=furnishings.some(name=>{const it=ITEMS.find(x=>x.name===name);return it&&it.type===t;});
  });
  const reqHTML=REQUIRED_TYPES.map(t=>`
    <span class="req-check ${typesMet[t]?'ok':'fail'}">
      ${typesMet[t]?'✓':'✗'} ${TYPE_ICON[t]} ${t}
    </span>`).join('');

  // ── Per-pokemon comfort bars ──
  const pokeBarHTML=h.residents.map(name=>{
    const pts=Math.min(pokemonPoints(name,furnishings), MAX_PTS);
    const pct=Math.round(pts/MAX_PTS*100);
    const full=pts>=MAX_PTS;
    const barColor=full?'#5dbb63':pts>=2?'#ffcf40':'#ff6b6b';
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">
      <div style="font-size:0.8rem;font-weight:700;min-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div>
      <div style="flex:1;height:8px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px;transition:width 0.4s ease"></div>
      </div>
      <div style="font-size:0.72rem;font-weight:800;color:${barColor};min-width:40px;text-align:right">${pts}/${MAX_PTS}${full?' ✓':''}</div>
    </div>`;
  }).join('');

  // ── Favorites accordion ──
  const typeOrder=['Decoration','Relaxation','Toy','Furniture'];

  const favsHTML=favKeys.map(fav=>{
    const who=favMap[fav]; // list of pokemon names that want this fav
    const matchingItems=itemsForTag(fav);
    const placedCount=furnishings.filter(n=>{const it=ITEMS.find(x=>x.name===n);return it&&it.tags.includes(fav);}).length;
    const satisfied=placedCount>0;
    const favId='fr-'+fav.replace(/[^a-zA-Z0-9]/g,'-');

    // group items by type
    const byType={};
    matchingItems.forEach(it=>{if(!byType[it.type])byType[it.type]=[];byType[it.type].push(it);});

    const dropdownHTML=typeOrder.filter(t=>byType[t]?.length).map(t=>`
      <div class="items-by-type">
        <div class="items-type-label">${TYPE_ICON[t]} ${t}</div>
        <div class="items-grid">
          ${byType[t].map(it=>{
            // preview: how many pts would this add to each resident that wants this fav
            const preview=who.map(pn=>{
              const gain=itemPtsForPokemon(it.name,pn);
              return gain>0?`+${gain} ${pn}`:'';
            }).filter(Boolean).join(', ');
            const safeItem=it.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
            return `<button class="item-chip type-${it.type}" onclick="addFurnishing('${safeItem}')" title="${preview||it.name}">
              ${it.name}${preview?`<span style="font-size:0.58rem;opacity:0.7;margin-left:3px">(${preview})</span>`:''}
            </button>`;
          }).join('')}
        </div>
      </div>`).join('');

    const noItems=!matchingItems.length;
    return `<div class="fav-row${satisfied?' satisfied':''}" id="${favId}">
      <div class="fav-header" onclick="document.getElementById('${favId}').classList.toggle('open')">
        <div class="fav-check${satisfied?' done':''}">${satisfied?'✓':''}</div>
        <div class="fav-label">${fav}
          <span class="who">${who.length===1?who[0]:who.length+' Pokémon'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${placedCount>0?`<span style="font-size:0.68rem;font-weight:800;color:#5dbb63">${placedCount} placed</span>`:''}
          <span class="fav-count">${matchingItems.length} item${matchingItems.length!==1?'s':''}</span>
          <span class="fav-arrow">▼</span>
        </div>
      </div>
      <div class="fav-dropdown">
        <div class="fav-dropdown-inner">
          ${noItems
            ?`<div style="color:var(--muted);font-size:0.78rem;padding:6px 0">No items tagged for this favorite.</div>`
            :dropdownHTML}
        </div>
      </div>
    </div>`;
  }).join('');

  // ── Placed furnishings summary ──
  const furnishingsHTML=furnishings.length?`
    <div class="furnishings-section">
      <div class="furnishings-title">🏡 Items in this house (${furnishings.length})</div>
      <div class="furnishing-items">
        ${furnishings.map((name,idx)=>{
          const it=ITEMS.find(x=>x.name===name)||{type:'Furniture'};
          return `<span class="furnishing-placed type-${it.type}">
            ${TYPE_ICON[it.type]||'📦'} ${name}
            <button class="furnishing-remove" onclick="removeFurnishing(${idx})" title="Remove">✕</button>
          </span>`;
        }).join('')}
      </div>
    </div>`:'';

  el.innerHTML=`
    <div class="comfort-header">
      <div class="card-title" style="margin-bottom:0"><span>🏠</span> Comfort & Furnishings</div>
      <div class="min-req-checks">${reqHTML}</div>
    </div>

    <div style="background:var(--surface2);border-radius:10px;padding:14px 16px;margin-bottom:16px">
      <div style="font-size:0.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Comfort per Pokémon (target: ${MAX_PTS} pts each)</div>
      ${pokeBarHTML}
    </div>

    <div style="font-size:0.76rem;color:var(--muted);margin-bottom:12px">Expand a Favorite to add items. Each item placed that matches a favorite scores 1 point per matching tag. Duplicates count.</div>
    <div class="fav-list">${favsHTML||'<div style="color:var(--muted)">No favorites data.</div>'}</div>

    <div class="other-items-section">
      <div class="other-items-header">
        <div class="other-items-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.fav-arrow').style.transform=this.nextElementSibling.classList.contains('open')?'rotate(180deg)':''">
          <div class="fav-check" style="background:rgba(255,183,77,0.15);border-color:rgba(255,183,77,0.3)">📦</div>
          <div class="fav-label" style="color:var(--accent)">Other Items
            <span class="who">Add any item to meet Decoration / Relaxation / Toy requirements</span>
          </div>
          <span class="fav-count">${ITEMS.length} items</span>
          <span class="fav-arrow" style="color:var(--muted);font-size:0.7rem;margin-left:4px;transition:transform 0.2s">▼</span>
        </div>
        <div class="other-items-body" id="otherItemsBody">
          <div class="other-items-search">
            <input type="text" id="otherItemSearch" placeholder="🔍 Search items..." oninput="renderOtherItems()">
          </div>
          <div class="other-items-inner" id="otherItemsGrid"></div>
        </div>
      </div>
    </div>

    ${furnishingsHTML}`;

  // render other items grid after innerHTML is set
  renderOtherItems();
}

function renderOtherItems(){
  const el=document.getElementById('otherItemsGrid');if(!el)return;
  const q=(document.getElementById('otherItemSearch')?.value||'').toLowerCase();
  const typeOrder=['Decoration','Relaxation','Toy','Furniture'];
  const filtered=ITEMS.filter(it=>it.name.toLowerCase().includes(q));
  const byType={};
  filtered.forEach(it=>{if(!byType[it.type])byType[it.type]=[];byType[it.type].push(it);});
  el.innerHTML=typeOrder.filter(t=>byType[t]?.length).map(t=>`
    <div class="items-by-type">
      <div class="items-type-label">${TYPE_ICON[t]} ${t}</div>
      <div class="items-grid">
        ${byType[t].map(it=>{
          const safe=it.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          return `<button class="item-chip type-${it.type}" onclick="addFurnishing('${safe}')" title="${it.tags.join(', ')||'No tags'}">
            ${it.name}
          </button>`;
        }).join('')}
      </div>
    </div>`).join('')||`<div style="color:var(--muted);font-size:0.78rem;padding:8px 0">No items match your search.</div>`;
}

// Init
renderSidebar();renderMain();

// Service Worker registration
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(()=>console.log('SW registered')).catch(()=>{});
  });
}
</script>
